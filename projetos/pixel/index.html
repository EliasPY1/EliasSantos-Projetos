<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Art Editor // Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e17;
    --bg-panel: #0d1220;
    --bg-panel-alt: #111827;
    --border: #1a2540;
    --border-glow: #00ff4133;
    --green: #00ff41;
    --green-dim: #00ff4180;
    --cyan: #00d4ff;
    --cyan-dim: #00d4ff60;
    --text: #c9d1d9;
    --text-dim: #6b7b8d;
    --danger: #ff3c5f;
    --warning: #ffb800;
  }

  body {
    font-family: 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 255, 65, 0.015) 2px,
      rgba(0, 255, 65, 0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-title .icon {
    font-size: 20px;
    color: var(--green);
    text-shadow: 0 0 10px var(--green-dim);
  }

  .header-title h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--green);
    text-shadow: 0 0 10px var(--green-dim);
    letter-spacing: 1px;
  }

  .header-title span.dim {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 12px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .header-btn {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: var(--bg-panel-alt);
    color: var(--text);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-btn:hover {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 12px var(--border-glow);
  }

  .header-btn.danger:hover {
    border-color: var(--danger);
    color: var(--danger);
    box-shadow: 0 0 12px rgba(255, 60, 95, 0.2);
  }

  .header-btn.primary {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0, 212, 255, 0.08);
  }

  .header-btn.primary:hover {
    background: rgba(0, 212, 255, 0.18);
    box-shadow: 0 0 16px rgba(0, 212, 255, 0.25);
  }

  /* ── MAIN LAYOUT ── */
  .app {
    display: flex;
    height: calc(100vh - 49px);
  }

  /* ── LEFT PANEL ── */
  .panel-left {
    width: 260px;
    min-width: 260px;
    border-right: 1px solid var(--border);
    background: var(--bg-panel);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .panel-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .panel-section:last-child { border-bottom: none; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label::before {
    content: '>';
    color: var(--green);
    text-shadow: 0 0 6px var(--green-dim);
  }

  /* ── TOOLS ── */
  .tools-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .tool-btn {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    background: var(--bg-panel-alt);
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .tool-btn:hover {
    border-color: var(--cyan-dim);
    color: var(--text);
  }

  .tool-btn.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0, 255, 65, 0.06);
    box-shadow: 0 0 10px var(--border-glow);
  }

  .tool-btn .emoji { font-size: 14px; }

  /* ── GRID SIZE ── */
  .grid-size-control {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .grid-size-control input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  .grid-size-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--cyan);
    cursor: pointer;
    box-shadow: 0 0 8px var(--cyan-dim);
  }

  .grid-size-control input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--cyan);
    cursor: pointer;
    border: none;
    box-shadow: 0 0 8px var(--cyan-dim);
  }

  .grid-size-value {
    font-size: 12px;
    color: var(--cyan);
    min-width: 45px;
    text-align: right;
    font-weight: 500;
  }

  /* ── COLOR PICKER ── */
  .color-current {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .color-preview {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    border: 2px solid var(--border);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .color-preview:hover { border-color: var(--green); }

  .color-preview input[type="color"] {
    position: absolute;
    inset: -8px;
    width: calc(100% + 16px);
    height: calc(100% + 16px);
    cursor: pointer;
    border: none;
    padding: 0;
  }

  .color-hex-input {
    font-family: 'Fira Code', monospace;
    font-size: 12px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--green);
    border-radius: 4px;
    width: 100px;
    outline: none;
    transition: border-color 0.2s;
  }

  .color-hex-input:focus { border-color: var(--green); }

  /* ── PALETTE ── */
  .palette-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
  }

  .palette-swatch {
    aspect-ratio: 1;
    border-radius: 3px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }

  .palette-swatch:hover {
    transform: scale(1.2);
    border-color: #fff;
    z-index: 1;
  }

  .palette-swatch.active {
    border-color: #fff;
    box-shadow: 0 0 8px rgba(255,255,255,0.3);
  }

  /* ── COLOR HISTORY ── */
  .history-grid {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .history-swatch {
    width: 24px;
    height: 24px;
    border-radius: 3px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg);
  }

  .history-swatch:hover {
    border-color: var(--green);
    transform: scale(1.15);
  }

  /* ── TOGGLE ── */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
  }

  .toggle-label {
    font-size: 11px;
    color: var(--text-dim);
  }

  .toggle-switch {
    width: 36px;
    height: 18px;
    border-radius: 9px;
    background: var(--border);
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }

  .toggle-switch.on {
    background: var(--green);
    box-shadow: 0 0 10px var(--green-dim);
  }

  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    top: 2px;
    left: 2px;
    transition: transform 0.2s;
  }

  .toggle-switch.on::after {
    transform: translateX(18px);
  }

  /* ── CANVAS AREA ── */
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  .canvas-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(0, 212, 255, 0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  .canvas-wrapper {
    position: relative;
    box-shadow: 0 0 40px rgba(0, 255, 65, 0.05), 0 0 80px rgba(0, 212, 255, 0.03);
  }

  #pixelCanvas {
    display: block;
    border: 1px solid var(--border);
    image-rendering: pixelated;
    cursor: crosshair;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-dim);
  }

  .status-bar .coords {
    color: var(--cyan);
    min-width: 80px;
  }

  .status-bar .status-msg {
    color: var(--green);
    text-shadow: 0 0 6px var(--green-dim);
  }

  /* ── TOOLTIP ── */
  .tooltip {
    position: fixed;
    padding: 4px 8px;
    background: var(--bg-panel-alt);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 10px;
    color: var(--text);
    pointer-events: none;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.15s;
    font-family: 'Fira Code', monospace;
  }

  .tooltip.show { opacity: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .app { flex-direction: column; }

    .panel-left {
      width: 100%;
      min-width: unset;
      flex-direction: row;
      flex-wrap: wrap;
      border-right: none;
      border-bottom: 1px solid var(--border);
      overflow-y: visible;
      max-height: 250px;
      overflow: auto;
    }

    .panel-section {
      flex: 1;
      min-width: 200px;
      border-bottom: none;
      border-right: 1px solid var(--border);
    }

    .canvas-area { min-height: 400px; }

    .header {
      flex-wrap: wrap;
      gap: 8px;
    }

    .header-actions { flex-wrap: wrap; }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* notification toast */
  .toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: 10px 20px;
    background: var(--bg-panel);
    border: 1px solid var(--green);
    border-radius: 6px;
    font-family: 'Fira Code', monospace;
    font-size: 12px;
    color: var(--green);
    box-shadow: 0 0 20px var(--border-glow);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 10000;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-title">
    <span class="icon">◆</span>
    <h1>PIXEL_EDITOR <span class="dim">v1.0</span></h1>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="undo()" title="Ctrl+Z">⟲ Undo</button>
    <button class="header-btn danger" onclick="clearCanvas()">✕ Clear</button>
    <button class="header-btn primary" onclick="exportPNG()">⤓ Export PNG</button>
  </div>
</header>

<!-- APP -->
<div class="app">

  <!-- LEFT PANEL -->
  <aside class="panel-left">

    <!-- TOOLS -->
    <div class="panel-section">
      <div class="section-label">Tools</div>
      <div class="tools-grid">
        <button class="tool-btn active" data-tool="draw" onclick="setTool('draw')">
          <span class="emoji">✏️</span> Draw
        </button>
        <button class="tool-btn" data-tool="erase" onclick="setTool('erase')">
          <span class="emoji">🧹</span> Erase
        </button>
        <button class="tool-btn" data-tool="fill" onclick="setTool('fill')">
          <span class="emoji">🪣</span> Fill
        </button>
        <button class="tool-btn" data-tool="pick" onclick="setTool('pick')">
          <span class="emoji">💉</span> Pick
        </button>
      </div>
    </div>

    <!-- GRID SIZE -->
    <div class="panel-section">
      <div class="section-label">Grid Size</div>
      <div class="grid-size-control">
        <input type="range" id="gridSize" min="8" max="64" value="16" step="1" oninput="updateGridSize(this.value)">
        <span class="grid-size-value" id="gridSizeLabel">16×16</span>
      </div>
    </div>

    <!-- COLOR PICKER -->
    <div class="panel-section">
      <div class="section-label">Color</div>
      <div class="color-current">
        <div class="color-preview" id="colorPreview" style="background:#00ff41">
          <input type="color" id="colorPicker" value="#00ff41" oninput="setColor(this.value)">
        </div>
        <input type="text" class="color-hex-input" id="hexInput" value="#00ff41" maxlength="7"
               onchange="setColor(this.value)" onkeydown="if(event.key==='Enter')setColor(this.value)">
      </div>
    </div>

    <!-- PALETTE -->
    <div class="panel-section">
      <div class="section-label">Palette</div>
      <div class="palette-grid" id="palette"></div>
    </div>

    <!-- COLOR HISTORY -->
    <div class="panel-section">
      <div class="section-label">History</div>
      <div class="history-grid" id="colorHistory"></div>
    </div>

    <!-- OPTIONS -->
    <div class="panel-section">
      <div class="section-label">Options</div>
      <div class="toggle-row">
        <span class="toggle-label">Grid Lines</span>
        <div class="toggle-switch on" id="gridToggle" onclick="toggleGrid()"></div>
      </div>
    </div>

  </aside>

  <!-- CANVAS -->
  <main class="canvas-area">
    <div class="canvas-wrapper">
      <canvas id="pixelCanvas"></canvas>
    </div>
    <div class="status-bar">
      <span class="coords" id="statusCoords">X: — Y: —</span>
      <span class="status-msg" id="statusMsg">Ready</span>
      <span id="statusTool">Tool: draw</span>
    </div>
  </main>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
(() => {
  // ── STATE ──
  const PALETTE_COLORS = [
    '#00ff41','#00ff80','#00ffbf','#00d4ff','#0080ff','#4040ff','#8000ff','#c000ff',
    '#ff00ff','#ff0080','#ff3c5f','#ff6600','#ffb800','#ffff00','#80ff00','#00ff00',
    '#ffffff','#c0c0c0','#808080','#404040','#202020','#000000','#330000','#003300',
    '#000033','#333300','#330033','#003333','#663300','#006633','#000066','#660066',
  ];

  let gridW = 16, gridH = 16;
  let currentColor = '#00ff41';
  let currentTool = 'draw';
  let showGrid = true;
  let isDrawing = false;

  // pixel data stored as 2D array: null = empty, string = hex color
  let pixels = [];
  let undoStack = [];
  const MAX_UNDO = 60;

  let colorHistory = [];

  const canvas = document.getElementById('pixelCanvas');
  const ctx = canvas.getContext('2d');

  // ── INIT ──
  function init() {
    buildPalette();
    initGrid(gridW, gridH);
    renderColorHistory();
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
  }

  function buildPalette() {
    const container = document.getElementById('palette');
    container.innerHTML = '';
    PALETTE_COLORS.forEach(c => {
      const el = document.createElement('div');
      el.className = 'palette-swatch';
      el.style.background = c;
      el.title = c;
      if (c === currentColor) el.classList.add('active');
      el.addEventListener('click', () => setColor(c));
      container.appendChild(el);
    });
  }

  function initGrid(w, h) {
    pixels = [];
    for (let y = 0; y < h; y++) {
      pixels[y] = [];
      for (let x = 0; x < w; x++) {
        pixels[y][x] = null;
      }
    }
    gridW = w;
    gridH = h;
    undoStack = [];
    resizeCanvas();
  }

  // ── CANVAS SIZING ──
  function resizeCanvas() {
    const area = document.querySelector('.canvas-area');
    const maxW = area.clientWidth - 60;
    const maxH = area.clientHeight - 80;
    const cellSize = Math.max(4, Math.min(Math.floor(maxW / gridW), Math.floor(maxH / gridH)));
    canvas.width = gridW * cellSize;
    canvas.height = gridH * cellSize;
    canvas.dataset.cellSize = cellSize;
    drawAll();
  }

  // ── DRAWING ──
  function drawAll() {
    const cs = parseInt(canvas.dataset.cellSize) || 16;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // checkerboard bg
    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridW; x++) {
        ctx.fillStyle = (x + y) % 2 === 0 ? '#181e2e' : '#141928';
        ctx.fillRect(x * cs, y * cs, cs, cs);
      }
    }

    // pixels
    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridW; x++) {
        if (pixels[y][x]) {
          ctx.fillStyle = pixels[y][x];
          ctx.fillRect(x * cs, y * cs, cs, cs);
        }
      }
    }

    // grid lines
    if (showGrid && cs > 5) {
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= gridW; x++) {
        ctx.beginPath();
        ctx.moveTo(x * cs + 0.5, 0);
        ctx.lineTo(x * cs + 0.5, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= gridH; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * cs + 0.5);
        ctx.lineTo(canvas.width, y * cs + 0.5);
        ctx.stroke();
      }
    }
  }

  // ── PIXEL OPERATIONS ──
  function getPixelCoord(e) {
    const rect = canvas.getBoundingClientRect();
    const cs = parseInt(canvas.dataset.cellSize);
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = Math.floor((e.clientX - rect.left) * scaleX / cs);
    const y = Math.floor((e.clientY - rect.top) * scaleY / cs);
    return { x: Math.max(0, Math.min(gridW - 1, x)), y: Math.max(0, Math.min(gridH - 1, y)) };
  }

  function saveUndo() {
    const snap = pixels.map(row => [...row]);
    undoStack.push(snap);
    if (undoStack.length > MAX_UNDO) undoStack.shift();
  }

  function setPixel(x, y, color) {
    if (x < 0 || x >= gridW || y < 0 || y >= gridH) return;
    pixels[y][x] = color;
  }

  function floodFill(sx, sy, newColor) {
    const target = pixels[sy][sx];
    if (target === newColor) return;
    const stack = [[sx, sy]];
    const visited = new Set();
    while (stack.length) {
      const [cx, cy] = stack.pop();
      const key = `${cx},${cy}`;
      if (visited.has(key)) continue;
      if (cx < 0 || cx >= gridW || cy < 0 || cy >= gridH) continue;
      if (pixels[cy][cx] !== target) continue;
      visited.add(key);
      pixels[cy][cx] = newColor;
      stack.push([cx+1, cy], [cx-1, cy], [cx, cy+1], [cx, cy-1]);
    }
  }

  // ── TOOLS ──
  function applyTool(x, y) {
    switch (currentTool) {
      case 'draw':
        setPixel(x, y, currentColor);
        addToColorHistory(currentColor);
        break;
      case 'erase':
        setPixel(x, y, null);
        break;
      case 'fill':
        floodFill(x, y, currentColor);
        addToColorHistory(currentColor);
        break;
      case 'pick': {
        const c = pixels[y][x];
        if (c) setColor(c);
        break;
      }
    }
    drawAll();
  }

  // ── CANVAS EVENTS ──
  canvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    isDrawing = true;
    saveUndo();
    const { x, y } = getPixelCoord(e);
    applyTool(x, y);
  });

  canvas.addEventListener('mousemove', e => {
    const { x, y } = getPixelCoord(e);
    document.getElementById('statusCoords').textContent = `X: ${x}  Y: ${y}`;
    if (isDrawing && (currentTool === 'draw' || currentTool === 'erase')) {
      applyTool(x, y);
    }
  });

  canvas.addEventListener('mouseup', () => { isDrawing = false; });
  canvas.addEventListener('mouseleave', () => { isDrawing = false; });

  // Touch support
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    isDrawing = true;
    saveUndo();
    const touch = e.touches[0];
    const { x, y } = getPixelCoord(touch);
    applyTool(x, y);
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const touch = e.touches[0];
    const { x, y } = getPixelCoord(touch);
    document.getElementById('statusCoords').textContent = `X: ${x}  Y: ${y}`;
    if (isDrawing && (currentTool === 'draw' || currentTool === 'erase')) {
      applyTool(x, y);
    }
  }, { passive: false });

  canvas.addEventListener('touchend', () => { isDrawing = false; });

  // ── PUBLIC API ──
  window.setTool = function(tool) {
    currentTool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tool === tool);
    });
    document.getElementById('statusTool').textContent = `Tool: ${tool}`;
    canvas.style.cursor = tool === 'pick' ? 'cell' : tool === 'fill' ? 'pointer' : 'crosshair';
  };

  window.setColor = function(hex) {
    hex = hex.trim();
    if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
    currentColor = hex;
    document.getElementById('colorPicker').value = hex;
    document.getElementById('hexInput').value = hex;
    document.getElementById('colorPreview').style.background = hex;
    document.querySelectorAll('.palette-swatch').forEach(s => {
      s.classList.toggle('active', s.style.background === hex || rgbToHex(s.style.background) === hex.toLowerCase());
    });
  };

  function rgbToHex(rgb) {
    if (rgb.startsWith('#')) return rgb.toLowerCase();
    const m = rgb.match(/(\d+)/g);
    if (!m || m.length < 3) return rgb;
    return '#' + m.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
  }

  window.updateGridSize = function(val) {
    val = parseInt(val);
    document.getElementById('gridSizeLabel').textContent = `${val}×${val}`;
    if (val !== gridW) {
      initGrid(val, val);
      showToast(`Grid resized to ${val}×${val}`);
    }
  };

  window.toggleGrid = function() {
    showGrid = !showGrid;
    document.getElementById('gridToggle').classList.toggle('on', showGrid);
    drawAll();
  };

  window.undo = function() {
    if (!undoStack.length) return;
    pixels = undoStack.pop();
    gridW = pixels[0].length;
    gridH = pixels.length;
    drawAll();
    showToast('Undo');
  };

  window.clearCanvas = function() {
    saveUndo();
    for (let y = 0; y < gridH; y++)
      for (let x = 0; x < gridW; x++)
        pixels[y][x] = null;
    drawAll();
    showToast('Canvas cleared');
  };

  window.exportPNG = function() {
    // render clean (no grid) at 1px per pixel, then scale up
    const scale = Math.max(1, Math.floor(1024 / Math.max(gridW, gridH)));
    const expCanvas = document.createElement('canvas');
    expCanvas.width = gridW * scale;
    expCanvas.height = gridH * scale;
    const ectx = expCanvas.getContext('2d');

    // transparent bg
    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridW; x++) {
        if (pixels[y][x]) {
          ectx.fillStyle = pixels[y][x];
          ectx.fillRect(x * scale, y * scale, scale, scale);
        }
      }
    }

    const link = document.createElement('a');
    link.download = `pixel_art_${gridW}x${gridH}.png`;
    link.href = expCanvas.toDataURL('image/png');
    link.click();
    showToast('PNG exported!');
  };

  // ── COLOR HISTORY ──
  function addToColorHistory(color) {
    colorHistory = colorHistory.filter(c => c !== color);
    colorHistory.unshift(color);
    if (colorHistory.length > 8) colorHistory.pop();
    renderColorHistory();
  }

  function renderColorHistory() {
    const container = document.getElementById('colorHistory');
    container.innerHTML = '';
    for (let i = 0; i < 8; i++) {
      const el = document.createElement('div');
      el.className = 'history-swatch';
      if (colorHistory[i]) {
        el.style.background = colorHistory[i];
        el.title = colorHistory[i];
        el.addEventListener('click', () => setColor(colorHistory[i]));
      }
      container.appendChild(el);
    }
  }

  // ── KEYBOARD SHORTCUTS ──
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
    if (e.key === 'd' || e.key === 'D') setTool('draw');
    if (e.key === 'e' || e.key === 'E') setTool('erase');
    if (e.key === 'f' || e.key === 'F') setTool('fill');
    if (e.key === 'i' || e.key === 'I') setTool('pick');
    if (e.key === 'g' || e.key === 'G') toggleGrid();
  });

  // ── TOAST ──
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = `> ${msg}`;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    document.getElementById('statusMsg').textContent = msg;
  }

  // ── GO ──
  init();
})();
</script>
</body>
</html>
